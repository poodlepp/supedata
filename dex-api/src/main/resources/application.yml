spring:
  application:
    name: dex-aggregator
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/dex_db
    username: root
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    jedis:
      pool:
        max-active: 20
        max-idle: 10

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: ${KAFKA_LISTENER_AUTO_STARTUP:true}
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: dex-aggregator
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

mybatis:
  configuration:
    map-underscore-to-camel-case: true

web3j:
  client-address: http://localhost:8545
  admin-client: false
  polling-interval: 15000

blockchain:
  chain-id: 1
  network: ethereum
  contracts:
    uniswap-v2-router: "0x7a250d5630B4cF539739dF2C5dAcb4c659F2488D"
    uniswap-v2-factory: "0x5C69bEe701ef814a2B6a3EDD4B1652CB9cc5aA6f"
  mainnet:
    rpc-url: ${MAINNET_RPC_URL:https://mainnet.infura.io/v3/c4d9767c95884ede9a0613c02eca0870}
    ws-url: ${MAINNET_WS_URL:wss://mainnet.infura.io/ws/v3/c4d9767c95884ede9a0613c02eca0870}
    connect-timeout-ms: ${MAINNET_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${MAINNET_READ_TIMEOUT_MS:4000}
    call-timeout-ms: ${MAINNET_CALL_TIMEOUT_MS:5000}
    chain-id: 1
    network-name: Ethereum Mainnet
  univ3:
    enabled: ${UNIV3_ENABLED:true}
    pool-address: ${UNIV3_POOL_ADDRESS:0x88e6A0c2dDD26FEEb64F039a2c41296FcB3f5640}
    pool-name: ${UNIV3_POOL_NAME:Uniswap V3 WETH/USDC 0.05%}
    lookback-blocks: ${UNIV3_LOOKBACK_BLOCKS:1000}
    scan-chunk-size: ${UNIV3_SCAN_CHUNK_SIZE:50}
    confirmations: ${UNIV3_CONFIRMATIONS:6}
    reorg-window: ${UNIV3_REORG_WINDOW:12}
    poll-interval-ms: ${UNIV3_POLL_INTERVAL_MS:5000}
    initial-delay-ms: ${UNIV3_INITIAL_DELAY_MS:3000}
    kafka-topic: ${UNIV3_KAFKA_TOPIC:dex.uniswap.v3.pool.blocks}

logging:
  level:
    root: INFO
    com.dex: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

server:
  port: 8080
