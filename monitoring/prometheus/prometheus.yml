global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: dex-local
    replica: prom-0

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: dex-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          service: dex-api
          env: local

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: thanos-query
    static_configs:
      - targets:
          - thanos-query:9090
